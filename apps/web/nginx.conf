# Static SPA serving with route fallback: a browser refresh on any
# frontend route (e.g. /learn/traffic_relationships) must return the app,
# not a 404.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets can be cached aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
