# Local full-stack AirSpaceSim: PostgreSQL + API (with migrations) + web.
#
#   cp .env.example .env      # adjust if needed
#   docker compose up --build
#
# Web UI:  http://127.0.0.1:8080
# API:     http://127.0.0.1:8000  (health: /health)
#
# This mirrors the decided hosting architecture (static frontend, API
# service, managed PostgreSQL) so development and deployment stay portable
# between providers (decision Q6).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airspacesim
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airspacesim-dev}
      POSTGRES_DB: airspacesim
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airspacesim -d airspacesim"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      AIRSPACESIM_API_DATABASE_URL: postgresql+psycopg2://airspacesim:${POSTGRES_PASSWORD:-airspacesim-dev}@db:5432/airspacesim
      AIRSPACESIM_API_AUTO_CREATE_SCHEMA: "false"
      AIRSPACESIM_API_CORS_ALLOWED_ORIGINS: '["http://127.0.0.1:8080","http://localhost:8080","http://127.0.0.1:5173","http://localhost:5173","http://127.0.0.1:5174","http://localhost:5174"]'
      AIRSPACESIM_API_CORS_ALLOW_CREDENTIALS: "true"
      AIRSPACESIM_API_ENVIRONMENT: ${AIRSPACESIM_API_ENVIRONMENT:-development}
      AIRSPACESIM_API_LOG_LEVEL: ${AIRSPACESIM_API_LOG_LEVEL:-INFO}
      AIRSPACESIM_API_ANONYMOUS_RUN_RETENTION_DAYS: ${AIRSPACESIM_API_ANONYMOUS_RUN_RETENTION_DAYS:-14}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: apps/web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
